name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            storybook/pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.PKG_READ_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Storybook dependencies
        working-directory: storybook
        run: pnpm install --frozen-lockfile
        env:
          NPM_AUTH_TOKEN: ${{ secrets.PKG_READ_TOKEN }}

      - name: Lint Storybook
        working-directory: storybook
        run: pnpm lint
